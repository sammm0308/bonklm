# Docker Compose for Vector Database Testing
# Start with: docker-compose -f team/qa/docker-compose.vector-db.yml up -d
# Stop with: docker-compose -f team/qa/docker-compose.vector-db.yml down
# View logs: docker-compose -f team/qa/docker-compose.vector-db.yml logs

version: '3.8'

services:
  # ChromaDB - Vector Database for AI applications
  chroma:
    image: chromadb/chroma:latest
    container_name: llmguardrails-chroma
    ports:
      - "8000:8000"
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=test-token
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Weaviate - Vector Search Engine
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: llmguardrails-weaviate
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=1
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - ENABLE_MODULES=vectorizer-test
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate-data:/var/lib/weaviate
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Qdrant - Vector Similarity Search Engine
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llmguardrails-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis - Optional: For caching and rate limiting tests
  redis:
    image: redis:7-alpine
    container_name: llmguardrails-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma-data:
  weaviate-data:
  qdrant-data:
  redis-data:
